name: Error Detection & Code Validation

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches-ignore:
      - main

jobs:
  code-validation:
    runs-on: ubuntu-latest
    # Run for all users (owner + collaborators)
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, fileinfo

      - name: Install Composer dependencies
        run: |
          composer install --no-interaction --prefer-dist

      - name: Run PHP Linting
        continue-on-error: false
        run: |
          echo "🔍 Checking PHP syntax..."
          find app routes -name "*.php" -type f | while read file; do
            php -l "$file" || exit 1
          done
          echo "PHP syntax check passed!"

      - name: Check for Laravel configuration errors
        continue-on-error: false
        run: |
          echo "🔍 Validating Laravel configuration..."
          php artisan config:cache --no-ansi 2>&1 | tee config-check.log
          if grep -i "error\|fatal" config-check.log; then
            echo " Configuration errors found!"
            exit 1
          fi
          echo " Configuration validation passed!"

      - name: Check for migration issues
        continue-on-error: false
        run: |
          echo " Checking migrations..."
          php artisan migrate:status --no-ansi 2>&1 || exit 1
          echo " Migration check passed!"

      - name: Validate routes
        continue-on-error: false
        run: |
          echo " Validating routes..."
          php artisan route:list --no-ansi > /dev/null 2>&1 || exit 1
          echo " Route validation passed!"

      - name: Run tests (if available)
        continue-on-error: false
        run: |
          echo " Running tests..."
          if [ -f "phpunit.xml" ]; then
            vendor/bin/phpunit --no-coverage 2>&1 | tee test-results.log
            if grep -i "failed\|error" test-results.log && ! grep -i "OK" test-results.log; then
              echo " Tests failed!"
              exit 1
            fi
          else
            echo "  No phpunit.xml found, skipping tests"
          fi
          echo " Tests passed!"

      - name: Check for common errors
        continue-on-error: false
        run: |
          echo " Scanning for common errors..."
          ERRORS=0
          
          # Check for DD statements left in code
          if grep -r "dd(" app routes --include="*.php" 2>/dev/null; then
            echo " Found dd() statements in code!"
            ERRORS=$((ERRORS+1))
          fi
          
          # Check for console.log left in JS
          if grep -r "console\.log" resources/js --include="*.js" 2>/dev/null; then
            echo "  Warning: Found console.log statements"
          fi
          
          # Check for commented code blocks
          if grep -r "^[[:space:]]*\/\/" app routes --include="*.php" 2>/dev/null | wc -l | grep -vq "^0$"; then
            echo "  Warning: Found commented code"
          fi
          
          if [ $ERRORS -gt 0 ]; then
            exit 1
          fi
          echo "✅ Common error check passed!"

  validation-summary:
    runs-on: ubuntu-latest
    needs: [code-validation]
    if: always()
    
    steps:
      - name: Check validation results
        run: |
          if [ "${{ job.status }}" == "failure" ]; then
            echo "❌ Validation failed! Branch cannot be published/merged."
            echo "Please fix the errors above and commit again."
            exit 1
          fi
          echo "✅ Validation complete! All checks passed."
