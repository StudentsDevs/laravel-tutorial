name: Branch Protection - Require Feature Branch

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main

jobs:
  check-branch-naming:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != github.repository_owner
    steps:
      - name: Check PR comes from feature branch
        run: |
          if [ "${{ github.head_ref }}" == "main" ]; then
            echo "❌ ERROR: You cannot create a PR from the main branch to main"
            exit 1
          fi
          echo "✅ PR is from a valid feature branch: ${{ github.head_ref }}"

  prevent-direct-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.actor != github.repository_owner
    steps:
      - name: Prevent direct push to main
        run: |
          echo "❌ ERROR: Direct pushes to main are not allowed!"
          echo "Please create a feature branch and submit a Pull Request instead."
          exit 1

  owner-bypass-branch:
    runs-on: ubuntu-latest
    if: github.actor == github.repository_owner
    steps:
      - name: Owner Bypass
        run: |
          echo "👤 Repository owner detected - branch restrictions bypassed"
          echo "Owner: ${{ github.repository_owner }}"
